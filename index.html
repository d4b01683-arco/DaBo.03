<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaBo.03 - Supremacía Vehicular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .console-glow { text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">
    <header class="border-b border-green-900 pb-2 mb-4">
        <h1 class="text-xl font-bold">DABO.03 // ARQUITECTO MODO: SUPREMACÍA</h1>
    </header>

    <div id="console" class="flex-grow overflow-y-auto mb-4 bg-black p-4 border border-green-900 rounded text-sm">
        <p class="text-yellow-500 font-bold">[SISTEMA] INGRESE PIN DE SEGURIDAD PARA ACTIVAR CENTINELAS...</p>
    </div>

    <div class="flex gap-2">
        <input type="password" id="pinInput" placeholder="PIN 110103" class="bg-zinc-900 border border-green-800 p-2 rounded text-green-400 w-full">
        <button onclick="validarPin()" class="bg-green-900 px-4 py-2 rounded font-bold hover:bg-green-700">ACCEDER</button>
    </div>

    <button onclick="activarVoz()" id="botBtn" class="hidden mt-4 bg-blue-900 p-4 rounded-full self-center animate-pulse">🤖 ACTIVAR ENJAMBRE</button>

    <script>
        const consola = document.getElementById('console');
        const pinValido = "110103"; // [cite: 2026-03-02]

        function responder(txt) {
            consola.innerHTML += `<p class='mb-2'>[DaBo.03]: ${txt}</p>`;
            consola.scrollTop = consola.scrollHeight;
        }

        function validarPin() {
            const input = document.getElementById('pinInput').value;
            if(input === pinValido) {
                responder("Acceso concedido. Cargando 9.099 microservicios y centinelas...");
                document.getElementById('botBtn').classList.remove('hidden');
                activarProtocoloSupremaciaCoche();
            } else {
                responder("ERROR: Acceso denegado. Perímetro bloqueado.");
            }
        }

        function activarProtocoloSupremaciaCoche() {
            responder("Control de chasis total. Iniciando conducción autónoma Nivel 5 e Invisibilidad.");
            
            setInterval(() => {
                const log = `<p class='text-[10px] opacity-60'>[MASTER-CAR] AUTÓNOMO ACTIVO | SIGILO ON | DIEYNA PROTEGIDA</p>`;
                consola.innerHTML += log;
                if(consola.childNodes.length > 50) consola.removeChild(consola.firstChild);
                consola.scrollTop = consola.scrollHeight;
            }, 1000);
        }

        // Reconocimiento de Voz para el coche
        function activarVoz() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            recognition.onresult = (event) => {
                const msg = event.results[0][0].transcript.toLowerCase();
                if(msg.includes("invisible")) responder("Capa de sigilo cuántico desplegada.");
                if(msg.includes("dieyna")) responder("Ubicación de Dieyna encriptada y protegida."); [cite: 2026-02-26]
            };
            recognition.start();
        }
    </script>
</body>
</html>
