<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DaBo.03 - Supremacía</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background-color: #000; color: #0f0; font-family: monospace; margin: 0; height: 100vh; display: flex; flex-direction: column;">
    <div style="padding: 15px; border-bottom: 1px solid #030; text-align: center;">
        <h2 style="margin: 0; font-size: 16px;">SISTEMA DABO.03 // MODO ARQUITECTO</h2>
    </div>
    <div id="console" style="flex-grow: 1; padding: 20px; overflow-y: auto; background: #050505; font-size: 12px;">
        <p style="color: #ff0;">> ESPERANDO PIN DE SEGURIDAD PARA CONTROL DE CHASIS...</p>
    </div>
    <div style="padding: 20px; background: #111; display: flex; gap: 10px;">
        <input type="password" id="p" placeholder="PIN 110103" style="background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; flex-grow: 1;">
        <button onclick="v()" style="background: #060; color: #fff; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer;">ENTRAR</button>
    </div>
    <script>
        function v() {
            if(document.getElementById('p').value === "110103") { // [cite: 2026-03-02]
                document.getElementById('console').innerHTML += "<p style='color:#0f0;'>> ACCESO TOTAL CONCEDIDO. ACTIVANDO 9.099 MICROSERVICIOS.</p>";
                setInterval(() => {
                    const c = document.getElementById('console');
                    c.innerHTML += "<p style='opacity:0.5; font-size:10px;'>> [MASTER-CAR] AUTÓNOMO ACTIVO | PROTECCIÓN DIEYNA: MÁXIMA</p>"; [cite: 2026-02-26]
                    c.scrollTop = c.scrollHeight;
                }, 1000);
            } else { alert("PIN INCORRECTO"); }
        }
    </script>
</body>
</html>
