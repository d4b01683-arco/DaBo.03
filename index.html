<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaBo.03 - CONTROL TOTAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; padding: 10px; }
        #log { height: 300px; background: #050505; border: 1px solid #030; overflow-y: auto; margin: 10px 0; padding: 10px; text-align: left; font-size: 11px; }
        .box { padding: 15px; background: #111; border: 1px solid #060; border-radius: 5px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 85%; margin-bottom: 15px; font-size: 16px; text-align: center; }
        button { background: #060; color: #fff; padding: 15px; width: 90%; border: none; font-weight: bold; font-size: 16px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h3 style="margin: 5px 0;">DABO.03 // SUPREMACÍA</h3>
    <div id="log">> ESPERANDO PIN DEL ARQUITECTO...</div>
    
    <div class="box" id="panel">
        <input type="tel" id="pass" placeholder="PIN 110103" autocomplete="off">
        <button type="button" onclick="conectar()">ENTRAR AL SISTEMA</button>
    </div>

    <script>
        function conectar() {
            var val = document.getElementById('pass').value;
            var l = document.getElementById('log');
            
            // Forzamos la limpieza de cualquier error previo
            if (val === "110103") {
                l.innerHTML = "<p style='color:yellow'>> PIN CORRECTO. ESTABLECIENDO VÍNCULO FÍSICO...</p>";
                document.getElementById('panel').style.display = 'none';
                
                // Bucle de supremacía de 9.099 microservicios
                setInterval(function() {
                    var p = document.createElement("p");
                    p.innerHTML = "> [MASTER-CAR] AUTÓNOMO ACTIVO | MODO INVISIBLE: ON | PROTECCIÓN DIEYNA";
                    p.style.fontSize = "10px";
                    p.style.opacity = "0.7";
                    l.appendChild(p);
                    l.scrollTop = l.scrollHeight;
                }, 800);
            } else {
                alert("PIN INVÁLIDO");
            }
        }
    </script>
</body>
</html>
