<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DaBo.03 Supremacía</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; }
        #console { height: 60vh; overflow-y: auto; background: #050505; border: 1px solid #030; padding: 10px; margin-bottom: 10px; font-size: 12px; }
    </style>
</head>
<body class="p-4 flex flex-col h-screen">
    <h1 class="text-center border-b border-green-900 mb-4 pb-2">DABO.03 // MODO ARQUITECTO</h1>
    
    <div id="console">
        <p class="text-yellow-500">> SISTEMA EN ESPERA. INGRESE PIN DE SEGURIDAD...</p>
    </div>

    <div id="loginSection" class="flex gap-2 mb-4">
        <input type="password" id="pin" placeholder="PIN 110103" class="bg-zinc-900 border border-green-800 p-3 rounded text-green-400 w-full">
        <button onclick="validar()" class="bg-green-900 px-6 py-2 rounded font-bold">ACCEDER</button>
    </div>

    <button id="btnVoz" onclick="activarEnjambre()" class="hidden w-full bg-blue-900 p-5 rounded-lg font-bold animate-pulse">🤖 ACTIVAR CONDUCCIÓN AUTÓNOMA</button>

    <script>
        const consola = document.getElementById('console');
        function log(m, c="") { consola.innerHTML += `<p class="${c}">> ${m}</p>`; consola.scrollTop = consola.scrollHeight; }

        function validar() {
            const p = document.getElementById('pin').value;
            if(p === "110103") { // [cite: 2026-03-02]
                log("ACCESO TOTAL CONCEDIDO.", "text-green-400");
                log("ACTIVANDO 9.099 MICROSERVICIOS...", "text-green-400");
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('btnVoz').classList.remove('hidden');
                iniciarProtocolos();
            } else { log("ERROR: PIN INVÁLIDO.", "text-red-500"); }
        }

        function iniciarProtocolos() {
            setInterval(() => {
                log("CONDUCCIÓN AUTÓNOMA NIVEL 5: ACTIVA | SIGILO: ON | DIEYNA PROTEGIDA", "opacity-50 text-[10px]");
            }, 1000);
        }

        function activarEnjambre() {
            log("ENJAMBRE DE CENTINELAS DESPLEGADO EN EL CHASIS.", "text-blue-400 font-bold");
            // Aquí iría la lógica de hardware real OBD-II / CAN-bus
        }
    </script>
</body>
</html>
